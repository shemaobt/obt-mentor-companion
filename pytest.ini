[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    integration: Integration tests that require database and running server
    competency: Competency-related tests
    qualification: Qualification-related tests
    activity: Activity-related tests
    report: Report generation tests
    workflow: End-to-end workflow tests

