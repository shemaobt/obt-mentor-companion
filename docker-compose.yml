version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: obt-mentor-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      REPLIT_OIDC_CLIENT_ID: ${REPLIT_OIDC_CLIENT_ID:-}
      REPLIT_OIDC_CLIENT_SECRET: ${REPLIT_OIDC_CLIENT_SECRET:-}
      REPLIT_OIDC_ISSUER: ${REPLIT_OIDC_ISSUER:-https://replit.com}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
    ports:
      - "5000:5000"
    networks:
      - obt-network
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./reports:/app/reports
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: obt-mentor-frontend
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - obt-network
    restart: unless-stopped

networks:
  obt-network:
    driver: bridge

